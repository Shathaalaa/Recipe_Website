{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipe Website{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body class="{% block body_class %}homepage{% endblock %}">
    <nav>
        <div class="logo">
            <i class="fa-regular fa-pepper-hot"></i>
            <h2>RecipeSite</h2>
        </div>

        <ul>
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'recipes:recipe_list' %}">Recipes</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="{% url 'recipes:login' %}">Sign In</a></li> 
            <!-- to be edited when all pages are ready! -->
        </ul>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% block script %}{% endblock %}

</body>
</html>
